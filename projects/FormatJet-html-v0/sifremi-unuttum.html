<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifremi Unuttum — FormatJet</title>
  <meta name="description" content="FormatJet hesap şifreni sıfırla.">
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css?v=7">
  <style>
    .auth-error {
      padding: 10px 14px; margin-bottom: 16px; font-size: 13px;
      color: #B91C1C; background: rgba(220,38,38,0.07);
      border: 1px solid rgba(220,38,38,0.25); border-radius: 8px;
    }
    .auth-ok {
      padding: 10px 14px; margin-bottom: 16px; font-size: 13px;
      color: #047857; background: rgba(5,150,105,0.07);
      border: 1px solid rgba(5,150,105,0.25); border-radius: 8px;
    }
  </style>
  <link rel="stylesheet" href="assets/css/components.css?v=13">
</head>
<body>

<div class="login-page">
  <div class="login-brand">
    <div class="login-brand-logo">
      <img src="assets/img/logo-icon-dark.png" alt="" class="login-brand-logo-icon" aria-hidden="true">
      <img src="assets/img/logo-text-dark.png" alt="FormatJet" class="login-brand-logo-text login-brand-logo-text--native">
    </div>
    <h2 class="login-brand-title">Şifreni mi unuttun?<br>Sorun değil.</h2>
    <ul class="login-brand-list">
      <li class="login-brand-item">
        <div class="login-brand-check">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <span>E-posta adresine sıfırlama bağlantısı göndeririz</span>
      </li>
      <li class="login-brand-item">
        <div class="login-brand-check">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <span>Bağlantı 1 saat geçerlidir</span>
      </li>
      <li class="login-brand-item">
        <div class="login-brand-check">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <span>Hesap bilgilerin güvende kalır</span>
      </li>
    </ul>
  </div>

  <div class="login-form-side">
    <div class="login-form-box">
      <h1 class="login-form-title">Şifreni sıfırla</h1>
      <p class="login-form-sub">Kayıtlı e-posta adresini gir, sıfırlama bağlantısı gönderelim.</p>

      <form novalidate id="resetForm">
        <div class="form-group">
          <label class="form-label" for="email">E-posta adresi</label>
          <input type="email" id="email" class="form-input" placeholder="ornek@email.com" autocomplete="email">
        </div>

        <div class="auth-error" id="authError" hidden></div>
        <div class="auth-ok" id="authOk" hidden></div>

        <button type="submit" class="btn-primary-full" id="resetBtn">Sıfırlama Bağlantısı Gönder</button>
      </form>

      <p class="login-register">Şifreni hatırladın mı? <a href="login.html">Giriş Yap</a></p>
    </div>
  </div>
</div>

<script src="assets/js/vendor/supabase.min.js"></script>
<script src="assets/js/fj-config.js?v=7"></script>
<script src="assets/js/auth.js?v=7"></script>
<script>
  const errBox = document.getElementById('authError');
  const okBox  = document.getElementById('authOk');

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.hidden = true; okBox.hidden = true;

    const email = document.getElementById('email').value.trim();
    if (!email) { errBox.textContent = 'E-posta adresi gerekli.'; errBox.hidden = false; return; }

    const btn = document.getElementById('resetBtn');
    btn.textContent = 'Gönderiliyor...'; btn.disabled = true;

    const { error } = await window.fjAuth.sb.auth.resetPasswordForEmail(email, {
      redirectTo: location.origin + location.pathname.replace('sifremi-unuttum.html', 'sifre-yenile.html'),
    });

    btn.textContent = 'Sıfırlama Bağlantısı Gönder'; btn.disabled = false;

    if (error) {
      errBox.textContent = 'Gönderilemedi: ' + error.message;
      errBox.hidden = false;
      return;
    }
    okBox.textContent = 'Sıfırlama bağlantısı gönderildi. Gelen kutunu (ve spam klasörünü) kontrol et.';
    okBox.hidden = false;
  });
</script>
<script src="assets/js/i18n.js?v=13"></script>
<script src="assets/js/premium-components.js?v=13"></script>
</body>
</html>
