<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Birleştir — FormatJet</title>
  <meta name="description" content="Birden fazla PDF dosyasını tek bir belgede birleştir. Ücretsiz, hızlı, güvenli.">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- pdf-lib: client-side PDF manipulation -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js" integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb" crossorigin="anonymous"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <div class="container">
    <div class="nav-inner">
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M9 1L3 9h5l-1 6 7-9H9l1-5z" fill="#fff" stroke="#fff" stroke-width="0.5" stroke-linejoin="round"/>
          </svg>
        </div>
        Format<span>Jet</span>
      </a>
      <div class="nav-right">
        <button class="btn-nav btn-ghost">Giriş Yap</button>
        <button class="btn-nav btn-accent">Pro'ya Geç</button>
      </div>
    </div>
  </div>
</nav>

<!-- TOOL PAGE -->
<main class="tool-page">
  <div class="container">

    <!-- Header -->
    <div class="tool-header">
      <a href="../index.html" class="tool-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        Tüm Araçlar
      </a>
      <div class="tool-page-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </div>
      <h1 class="tool-page-title font-display">PDF Birleştir</h1>
      <p class="tool-page-desc">Birden fazla PDF'i sürükleyerek sıraya koy ve tek dosyada birleştir.</p>
    </div>

    <!-- Workspace -->
    <div class="tool-workspace">

      <!-- Limit bar -->
      <div class="limit-bar">
        <span>Ücretsiz plan: en fazla <strong>10 dosya</strong>, her biri <strong>25 MB</strong></span>
        <a href="#" style="color: var(--accent); font-weight:500; font-size:12px;">Pro'ya geç →</a>
      </div>

      <!-- Upload zone -->
      <div class="upload-zone" id="uploadZone">
        <input type="file" class="upload-zone-input" id="fileInput" multiple accept=".pdf,application/pdf">
        <div id="uploadPrompt">
          <div class="drop-icon" style="margin:0 auto 12px">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="drop-title"><strong>PDF'leri buraya sürükle</strong> veya tıkla</p>
          <p class="drop-sub">Birden fazla dosya seçebilirsin · Maks. 25 MB/dosya</p>
        </div>
      </div>

      <!-- File list -->
      <div class="file-list" id="fileList"></div>

      <!-- Add more -->
      <div id="addMoreWrapper" style="display:none; margin-bottom: 16px;">
        <label for="addMoreInput" style="display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--text-2); cursor:pointer; padding:8px 14px; border:1px dashed var(--border-light); border-radius:var(--r-md); transition:all .15s;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Daha fazla PDF ekle
        </label>
        <input type="file" id="addMoreInput" accept=".pdf,application/pdf" multiple style="display:none;">
      </div>

      <!-- Progress -->
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- Action -->
      <button class="btn-action" id="mergeBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        PDF Dosyalarını Birleştir
      </button>

      <!-- Result -->
      <div class="result-panel" id="resultPanel">
        <svg class="result-check" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <h2 class="result-title font-display">PDF hazır!</h2>
        <p class="result-meta" id="resultMeta"></p>
        <a href="#" class="btn-download" id="downloadLink" download="birlesik.pdf">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          İndir
        </a>
        <br>
        <button class="btn-again" id="resetBtn">Yeni birleştirme yap</button>
      </div>

    </div>
  </div>
</main>

<script src="../assets/js/tools/pdf-merge.js"></script>
</body>
</html>
